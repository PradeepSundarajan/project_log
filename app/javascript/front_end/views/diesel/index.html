<div>
  <h2>Diesel Transactions</h2>
  <table border="1">
    <tr>
      <th>Work</th>
      <th>Liters</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
    <tr ng-repeat="t in txns">
      <td>{{ t.work_table.id }}</td>
      <td>{{ t.liters }}</td>
      <td>{{ t.date }}</td>
      <td><button ng-click="deleteTxn(t.id)">Delete</button></td>
    </tr>
  </table>
</div>
